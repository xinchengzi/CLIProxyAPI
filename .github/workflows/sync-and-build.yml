name: Sync Upstream and Build
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout local branch
        uses: actions/checkout@v4
        with:
          ref: local
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Sync upstream and rebase
        id: sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git remote add upstream https://github.com/router-for-me/CLIProxyAPI.git
          git fetch upstream --tags
          
          git checkout origin/main
          git switch -C main
          git reset --hard upstream/main
          git push origin main --force
          
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          echo "version=${VERSION#v}-local" >> $GITHUB_OUTPUT
          
          git checkout origin/local
          git switch -C local
          if git rebase main; then
            git push origin local --force
            echo "rebase_success=true" >> $GITHUB_OUTPUT
          else
            echo "rebase_success=false" >> $GITHUB_OUTPUT
            git rebase --abort
            exit 1
          fi
      - name: Login to GHCR
        if: steps.sync.outputs.rebase_success == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        if: steps.sync.outputs.rebase_success == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/xinchengzi/cliproxyapi:${{ steps.sync.outputs.version }}
            ghcr.io/xinchengzi/cliproxyapi:latest
          build-args: |
            VERSION=${{ steps.sync.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
